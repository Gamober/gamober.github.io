<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes">
<title>健身饮食计算器 — 减脂增肌饮食方案</title>
<meta name="description" content="基于好人松松Excel套表的健身饮食计算器，支持减脂/增肌方案自动计算">
<link rel="stylesheet" href="../css/style.css?v=1">
</head>
<body>
<div class="app">
  <header>
    <h1>健身饮食计算器</h1>
    <div class="subtitle">好人松松 Excel 套表 · 减脂增肌饮食方案</div>
  </header>

  <nav class="nav-row">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="calc">计算器</button>
      <button class="tab-btn" data-tab="foods">食物营养表</button>
      <button class="tab-btn" data-tab="faq">问答汇总</button>
      <button class="tab-btn" data-tab="guide">使用说明</button>
    </div>
    <div class="lang-switch">
      <a href="./" class="active" data-lang="zh">中文</a>
      <a href="../en/" data-lang="en">EN</a>
    </div>
  </nav>

  <!-- TAB: Calculator -->
  <div class="tab-panel" id="panel-calc" style="display:block">

    <!-- Personal Info -->
    <div class="card">
      <h2 class="collapse-toggle">个人基本信息</h2>
      <div class="collapse-content">
        <div class="form-row">
          <div class="form-group">
            <label>性别</label>
            <select id="gender">
              <option value="male">男</option>
              <option value="female">女</option>
            </select>
          </div>
          <div class="form-group">
            <label>身高 <span class="unit">cm</span></label>
            <input type="number" id="height" value="175" min="130" max="220" step="0.1">
          </div>
          <div class="form-group">
            <label>体重 <span class="unit">kg</span></label>
            <input type="number" id="weight" value="75" min="30" max="200" step="0.1">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>年龄 <span class="unit">岁</span></label>
            <input type="number" id="age" value="25" min="14" max="80">
          </div>
          <div class="form-group">
            <label>体脂率 <span class="unit">% (选填)</span></label>
            <input type="number" id="bodyFat" value="" min="3" max="50" step="0.1" placeholder="选填">
          </div>
          <div class="form-group">
            <label>训练水平</label>
            <select id="trainingLevel">
              <option value="novice">新手</option>
              <option value="intermediate">有基础</option>
              <option value="advanced">老手</option>
            </select>
          </div>
        </div>
        <div class="form-row" id="plan-selector-area"></div>
        <div class="form-row">
          <div class="form-group">
            <label>每周有氧时间 <span class="unit">小时/周</span></label>
            <input type="number" id="cardioHours" value="0" min="0" max="20" step="0.5">
          </div>
          <div class="form-group">
            <label>有氧强度</label>
            <select id="cardioType">
              <option value="moderate">中低强度（快走/骑车）</option>
              <option value="intense">中高强度（跑步/游泳）</option>
            </select>
          </div>
        </div>
        <p class="callout" style="margin-top:8px">初始数值为预设，请改为自己的数据。选择不同训练时间的方案，餐序会自动调整。</p>
      </div>
    </div>

    <!-- Results Summary -->
    <div class="card" id="metrics-card">
      <h2>热量计算结果</h2>
      <div class="result-grid" id="results-metrics"></div>
      <div id="weight-guide" style="font-size:.75rem;color:#888;margin-top:10px"></div>
      <div id="cardio-note" style="font-size:.75rem;color:#888;margin-top:4px"></div>
    </div>

    <!-- Macros -->
    <div class="card">
      <h2>每日宏量营养素</h2>
      <div id="results-macros"></div>
    </div>

    <!-- Training Day Meals -->
    <div class="card">
      <h2>力训日餐单 <span style="font-size:.7rem;color:#27ae60">● 训练日</span></h2>
      <div id="meals-training"></div>
    </div>

    <!-- Rest Day Meals -->
    <div class="card rest-day">
      <h2>休息日餐单 <span style="font-size:.7rem;color:#2980b9">● 休息日</span></h2>
      <div id="meals-rest"></div>
    </div>

  </div><!-- /panel-calc -->

  <!-- TAB: Food Tables -->
  <div class="tab-panel" id="panel-foods" style="display:none">
    <div class="card"></div>
  </div>

  <!-- TAB: FAQ -->
  <div class="tab-panel" id="panel-faq" style="display:none">
    <div class="card"></div>
  </div>

  <!-- TAB: Guide -->
  <div class="tab-panel" id="panel-guide" style="display:none">
    <div class="card"></div>
  </div>

  <footer>
    <p>Data from 好人松松 B站视频 & Excel套表 · Calculator for reference only</p>
  </footer>
</div>

<script src="../js/i18n.js?v=1"></script>
<script src="../js/engine.js?v=1"></script>
<script src="../js/foods.js?v=1"></script>
<script src="../js/faq.js?v=1"></script>
<script src="../js/app.js?v=1"></script>
</body>
</html>
